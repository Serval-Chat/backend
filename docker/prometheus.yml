global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "backend"
    scrape_interval: 5s
    static_configs:
      - targets:
          - "host.docker.internal:4001"
          - "host.docker.internal:4002"
          - "host.docker.internal:4003"
          - "host.docker.internal:4004"
    metrics_path: /metrics
