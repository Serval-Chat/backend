services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: chat-backend
    env_file: ../.env
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_public:/app/public
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  livekit:
    image: livekit/livekit-server:v1.8.0
    container_name: chat-livekit
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: chat-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: chat-otel-collector
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: chat-prometheus
    volumes:
      - ./prometheus.production.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.listen-address=127.0.0.1:9090"
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  tempo:
    image: grafana/tempo:2.4.0
    container_name: chat-tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:9411:9411"
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  loki:
    image: grafana/loki:2.9.0
    container_name: chat-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  promtail:
    image: grafana/promtail:2.9.0
    container_name: chat-promtail
    volumes:
      - /var/log:/var/log:ro
      - ./promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: chat-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_SERVER_ENFORCE_DOMAIN=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  backend_uploads:
  backend_logs:
  backend_public:

networks:
  app_network:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-backend}_app_network
