services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: chat-livekit-dev
    ports:
      - "127.0.0.1:17880:7880"
      - "127.0.0.1:17881:7881"
      - "127.0.0.1:17882:7882/udp"
    command: --dev --bind 0.0.0.0
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-change_me_livekit_key}: ${LIVEKIT_API_SECRET:-change_me_livekit_secret}"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chat-redis-dev
    ports:
      - "16379:6379"
    # Dev Redis is intentionally passwordless to simplify local cluster setup
    command: redis-server --loglevel verbose
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    container_name: chat-elasticsearch-dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:19200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  nginx:
    image: nginx:latest
    container_name: chat-nginx-dev
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: chat-otel-collector-dev
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "14317:4317"
      - "14318:4318"
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: chat-prometheus-dev
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.enable-remote-write-receiver"
    ports:
      - "19090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    image: grafana/tempo:2.4.0
    container_name: chat-tempo-dev
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "13200:3200"
      - "19411:9411"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: chat-loki-dev
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "13100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: chat-promtail-dev
    volumes:
      - /var/log:/var/log:ro
      - ./promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: chat-grafana-dev
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "13001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  elasticsearch_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
