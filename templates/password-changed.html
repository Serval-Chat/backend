<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .notice {
            background-color: #d1ecf1;
            border-left: 4px solid #0c5460;
            padding: 15px;
            margin: 20px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #777;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Serchat</h2>
        </div>
        <p>Hello,</p>
        <div class="notice">
            <p><strong>Security Alert:</strong> Your password was successfully changed.</p>
        </div>
        <p>If you performed this action, you can safely ignore this email.</p>
        <p><strong>If you did NOT change your password, please contact support immediately or try to reset it again to
                regain access.</strong></p>
        <div class="footer">
            <p>This is an automated security notification.</p>
        </div>
    </div>
</body>

</html>
